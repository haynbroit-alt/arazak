<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LASTO</title>
<style>
  :root {
    --bg: #f7f7f5; --panel: #ffffff; --text: #1a1a1a; --muted: #6b6b6b;
    --accent: #2563eb; --border: #e2e2de; --code-bg: #f0f0ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16161a; --panel: #1f1f24; --text: #e8e8e6; --muted: #9a9a97;
      --accent: #7aa2ff; --border: #32323a; --code-bg: #26262c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 16px/1.6 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  header {
    display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
    padding: 1rem 1.25rem 0;
  }
  header h1 { font-size: 1.25rem; margin: 0; }
  header span { color: var(--muted); font-size: .85rem; }
  nav { display: flex; gap: .4rem; flex-wrap: wrap; padding: .75rem 1.25rem; }
  nav button {
    border: 1px solid var(--border); background: var(--panel); color: var(--text);
    padding: .4rem .9rem; border-radius: 999px; cursor: pointer; font-size: .9rem;
  }
  nav button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  main {
    max-width: 780px; margin: 0 auto 4rem; padding: 1.5rem 1.25rem;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  }
  main h1, main h2, main h3 { line-height: 1.3; }
  main h1 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: .4rem; }
  main h2 { font-size: 1.15rem; margin-top: 1.8em; }
  main a { color: var(--accent); }
  main hr { border: 0; border-top: 1px solid var(--border); margin: 2rem 0; }
  main code {
    background: var(--code-bg); padding: .1em .35em; border-radius: 4px;
    font-size: .9em; font-family: ui-monospace, monospace;
  }
  .tablewrap { overflow-x: auto; }
  main table { border-collapse: collapse; width: 100%; font-size: .92rem; }
  main th, main td { border: 1px solid var(--border); padding: .45rem .6rem; text-align: left; }
  main th { background: var(--code-bg); }
  .err { color: #c0392b; }
</style>
</head>
<body>
<header><h1>LASTO</h1><span>Système d'exploitation personnel</span></header>
<nav id="nav"></nav>
<main id="content">Chargement…</main>
<script>
const FILES = [
  ["LASTO.md", "Prompt"],
  ["CONTEXTE.md", "Contexte"],
  ["DECISIONS.md", "Décisions"],
  ["JOURNAL.md", "Journal"],
  ["INTEGRATIONS.md", "Intégrations"],
  ["OUTILS.md", "Outils"],
  ["DEPLOIEMENT.md", "Déploiement"],
];

const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

function inline(s) {
  return esc(s)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(https?:\/\/[^\s)]+)/g, '<a href="$1">$1</a>');
}

function unwrap(md) {
  // Recolle les lignes coupées en dur dans le source (paragraphes et puces).
  const out = [];
  for (const l of md.split("\n")) {
    const prev = out[out.length - 1];
    const plain = l.trim() !== "" && !/^\s*(#{1,4}\s|[-*]\s|\||>|---+\s*$)/.test(l);
    if (plain && prev && prev.trim() !== "" && !/^\s*(\||---+\s*$)/.test(prev) && !/^\s*#{1,4}\s/.test(prev)) {
      out[out.length - 1] = prev + " " + l.trim();
    } else {
      out.push(l);
    }
  }
  return out;
}

function render(md) {
  const lines = unwrap(md);
  let html = "", list = false, quote = false, i = 0;
  const closeAll = () => {
    if (list) { html += "</ul>"; list = false; }
    if (quote) { html += "</blockquote>"; quote = false; }
  };
  while (i < lines.length) {
    const l = lines[i];
    if (/^\s*\|/.test(l)) {           // table block
      closeAll();
      const rows = [];
      while (i < lines.length && /^\s*\|/.test(lines[i])) { rows.push(lines[i]); i++; }
      const cells = r => r.replace(/^\s*\||\|\s*$/g, "").split("|").map(c => inline(c.trim()));
      html += '<div class="tablewrap"><table><tr>' +
        cells(rows[0]).map(c => `<th>${c}</th>`).join("") + "</tr>" +
        rows.slice(2).map(r => "<tr>" + cells(r).map(c => `<td>${c}</td>`).join("") + "</tr>").join("") +
        "</table></div>";
      continue;
    }
    const h = l.match(/^(#{1,4})\s+(.*)/);
    if (h) { closeAll(); html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; }
    else if (/^\s*[-*]\s+/.test(l)) {
      if (!list) { html += "<ul>"; list = true; }
      html += `<li>${inline(l.replace(/^\s*[-*]\s+/, ""))}</li>`;
    }
    else if (/^\s*>\s?/.test(l)) {
      if (!quote) { closeAll(); html += "<blockquote>"; quote = true; }
      html += inline(l.replace(/^\s*>\s?/, "")) + " ";
    }
    else if (/^\s*---+\s*$/.test(l)) { closeAll(); html += "<hr>"; }
    else if (l.trim() === "") { closeAll(); }
    else { closeAll(); html += `<p>${inline(l)}</p>`; }
    i++;
  }
  closeAll();
  return html;
}

async function show(file) {
  document.querySelectorAll("nav button").forEach(b =>
    b.classList.toggle("active", b.dataset.f === file));
  const main = document.getElementById("content");
  try {
    const r = await fetch("./" + file);
    if (!r.ok) throw new Error(r.status);
    main.innerHTML = render(await r.text());
  } catch (e) {
    main.innerHTML = `<p class="err">Impossible de charger ${esc(file)} (${esc(String(e.message))}).</p>`;
  }
  location.hash = file;
}

const nav = document.getElementById("nav");
for (const [f, label] of FILES) {
  const b = document.createElement("button");
  b.textContent = label; b.dataset.f = f; b.onclick = () => show(f);
  nav.appendChild(b);
}
show(FILES.some(([f]) => f === location.hash.slice(1)) ? location.hash.slice(1) : "LASTO.md");
</script>
</body>
</html>
